<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Ticket — Print Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #22221f;
    --paper: #f9f7f1;
    --paper-dim: #efece3;
    --blue: #2c4a6e;
    --blue-dim: #4d6c8f;
    --rust: #b8452e;
    --kraft: #c9ad80;
    --green: #4b6b4f;
    --rule: #d8d4c7;
    --rule-dark: #b7b2a1;
    --font-display: 'Archivo', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{ box-sizing: border-box; }
  body{ margin:0; background: var(--ink); color: var(--ink); font-family: var(--font-body); min-height: 100vh; }
  .app{ display:flex; min-height:100vh; }

  /* ---------- SIDEBAR ---------- */
  .sidebar{ width: 260px; flex-shrink:0; background: #1a1a17; padding: 28px 0 28px 18px; display:flex; flex-direction:column; gap:6px; }
  .sidebar-title{ font-family: var(--font-display); font-weight:900; letter-spacing: 0.04em; color: var(--paper); font-size: 13px; text-transform: uppercase; padding: 0 20px 18px 6px; border-bottom: 1px solid #35342e; margin-bottom: 14px; }
  .sidebar-title span{ display:block; font-family: var(--font-mono); font-weight:400; color: var(--kraft); font-size: 11px; letter-spacing: 0.08em; margin-top: 4px; }
  .tab{ position:relative; background: var(--paper-dim); color: var(--ink); border: none; border-radius: 6px 0 0 6px; padding: 12px 16px 12px 18px; text-align:left; font-family: var(--font-body); font-weight:600; font-size: 13.5px; cursor:pointer; margin-right: -1px; transition: transform .12s ease, background .12s ease; }
  .tab .tab-sub{ display:flex; align-items:center; gap:6px; font-family: var(--font-mono); font-weight: 400; font-size: 10.5px; color: #6b6a63; margin-top: 3px; letter-spacing: 0.02em; }
  .tab:hover{ transform: translateX(-2px); }
  .tab.active{ background: var(--paper); transform: translateX(-4px); box-shadow: -3px 0 0 var(--rust); }
  .tab.active .tab-sub{ color: var(--blue-dim); }
  .mini-badge{ display:inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9.5px; letter-spacing: 0.04em; }
  .mini-badge.draft{ background: #e3ded0; color:#7a765f; }
  .mini-badge.submitted{ background: rgba(75,107,79,0.18); color: var(--green); }
  .new-project-btn{ margin: 14px 20px 0 6px; background: transparent; border: 1.5px dashed #4a4940; color: var(--kraft); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.03em; padding: 10px 12px; border-radius: 4px; cursor:pointer; text-align:left; }
  .new-project-btn:hover{ border-color: var(--kraft); color: var(--paper); }
  .sidebar-footer{ margin-top:auto; padding: 14px 20px 0 6px; }
  .backup-btn{ width:100%; background: transparent; border: 1px solid #35342e; color: #8f8c7e; font-family: var(--font-mono); font-size: 11px; padding: 9px 10px; border-radius: 4px; cursor:pointer; text-align:left; letter-spacing:0.02em; }
  .backup-btn:hover{ color: var(--paper); border-color: var(--kraft); }
  .empty-sidebar-note{ color: #6b6a63; font-family: var(--font-mono); font-size: 11.5px; padding: 4px 20px 0 6px; line-height:1.5; }

  /* ---------- MAIN ---------- */
  .main{ flex:1; padding: 36px 44px 60px; overflow-x:auto; }
  .no-project{ color: var(--paper-dim); font-family: var(--font-mono); padding-top: 80px; text-align:center; font-size: 14px; }
  .ticket{ background: var(--paper); max-width: 1080px; margin: 0 auto; border-radius: 3px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); position:relative; overflow:hidden; }
  .ticket::before{ content:""; position:absolute; top:0; left:0; right:0; height: 7px; background: repeating-linear-gradient(90deg, var(--ink) 0 10px, transparent 10px 20px); opacity:0.08; }
  .ticket.locked .ledger, .ticket.locked .meta-row{ position:relative; }
  .ticket-header{ padding: 30px 38px 18px; border-bottom: 2px solid var(--ink); display:flex; justify-content:space-between; align-items:flex-start; gap: 24px; }
  .ticket-header-left{ flex:1; }
  .eyebrow{ font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--rust); text-transform:uppercase; margin-bottom: 8px; display:flex; align-items:center; gap:10px; }
  .status-badge{ font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 10px; text-transform:uppercase; }
  .status-badge.draft{ background: #e3ded0; color: #7a765f; border: 1px solid #cfc9b5; }
  .status-badge.submitted{ background: rgba(75,107,79,0.12); color: var(--green); border: 1px solid rgba(75,107,79,0.4); }
  .project-name-input{ font-family: var(--font-display); font-weight:900; font-size: 30px; color: var(--ink); border: none; background: transparent; width: 100%; padding: 2px 0; border-bottom: 2px solid transparent; }
  .project-name-input:focus{ outline:none; border-bottom-color: var(--rule-dark); }
  .stamp{ font-family: var(--font-mono); font-size: 11px; color: var(--blue); border: 2px solid var(--blue); border-radius: 4px; padding: 8px 14px; transform: rotate(2deg); letter-spacing: 0.06em; text-align:center; white-space:nowrap; }
  .stamp b{ display:block; font-family: var(--font-display); font-size: 15px; letter-spacing: 0.02em; }
  .stamp.is-submitted{ color: var(--green); border-color: var(--green); }

  .meta-row{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 20px 38px; border-bottom: 1px solid var(--rule); background: var(--paper-dim); }
  .field label{ display:block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform:uppercase; color: var(--blue-dim); margin-bottom: 6px; }
  .field input, .field textarea{ width:100%; font-family: var(--font-body); font-size: 13.5px; color: var(--ink); background: var(--paper); border: 1px solid var(--rule-dark); border-radius: 3px; padding: 8px 10px; }
  .field input:focus, .field textarea:focus{ outline: 2px solid var(--blue-dim); outline-offset:0; }
  .field input:disabled, .field textarea:disabled{ background: var(--paper-dim); color:#8a8878; cursor:not-allowed; }
  .field.notes{ grid-column: 1 / -1; }
  .field.notes textarea{ resize:vertical; min-height: 44px; }

  /* ---------- MOCKUPS ---------- */
  .mockups-section{ padding: 22px 38px 8px; border-bottom: 1px solid var(--rule); }
  .section-title{ font-family: var(--font-display); font-weight:800; font-size: 13px; letter-spacing: 0.06em; text-transform:uppercase; color: var(--ink); margin-bottom: 12px; display:flex; align-items:center; gap: 10px; }
  .section-title::after{ content:""; flex:1; height:1px; background: var(--rule-dark); }
  .mockup-grid{ display:flex; flex-wrap:wrap; gap: 12px; margin-bottom: 14px; }
  .mockup-card{ position:relative; width: 96px; }
  .mockup-thumb{ width:96px; height:96px; border-radius:4px; object-fit:cover; border:1px solid var(--rule-dark); background:var(--paper-dim); display:block; }
  .mockup-file-card{ width:96px; height:96px; border-radius:4px; border:1px solid var(--rule-dark); background:var(--paper-dim); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; text-decoration:none; color: var(--blue); font-family: var(--font-mono); font-size: 22px; }
  .mockup-link-card{ width:96px; height:96px; border-radius:4px; border:1px dashed var(--blue-dim); background: rgba(44,74,110,0.05); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; text-decoration:none; color: var(--blue); font-family: var(--font-mono); font-size: 20px; padding:6px; text-align:center; }
  .mockup-name{ font-family: var(--font-mono); font-size: 9px; color: #78765f; margin-top: 4px; word-break: break-word; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .mockup-remove{ position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background: var(--rust); color:white; border:none; font-size:13px; line-height:1; cursor:pointer; }
  .mockup-actions{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom: 16px; }
  .upload-btn{ font-family: var(--font-mono); font-size: 11.5px; letter-spacing:0.03em; padding: 8px 12px; border-radius: 4px; border: 1.5px dashed var(--rule-dark); background:none; color: var(--blue-dim); cursor:pointer; }
  .upload-btn:hover{ border-color: var(--blue); color: var(--blue); }
  .link-add{ display:flex; gap:6px; align-items:center; }
  .link-add input{ font-family: var(--font-mono); font-size: 11.5px; padding: 8px 10px; border:1px solid var(--rule-dark); border-radius:4px; width: 220px; background: var(--paper); }
  .link-add button{ font-family: var(--font-mono); font-size: 11.5px; padding: 8px 10px; border-radius:4px; border:1px solid var(--blue-dim); background:none; color:var(--blue-dim); cursor:pointer; }
  .link-add button:hover{ background: var(--blue-dim); color:white; }
  .file-hint{ font-family: var(--font-mono); font-size: 10px; color: var(--rule-dark); margin-bottom:14px; }

  /* ---------- LEDGER ---------- */
  .ledger{ padding: 20px 38px 34px; }
  table{ width:100%; border-collapse: collapse; }
  thead th{ text-align:left; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform:uppercase; color: var(--blue-dim); padding: 0 8px 8px; border-bottom: 1.5px solid var(--ink); }
  tbody td{ padding: 7px 8px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tbody tr:nth-child(even){ background: rgba(44,74,110,0.035); }
  tbody tr:hover{ background: rgba(184,69,46,0.05); }
  td input, td select{ width:100%; font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); background: transparent; border: 1px solid transparent; border-radius: 3px; padding: 6px 6px; }
  td input:focus, td select:focus{ outline:none; border-color: var(--blue-dim); background: var(--paper); }
  td input:disabled, td select:disabled{ color:#8a8878; cursor:not-allowed; }
  td select{ font-family: var(--font-body); font-size: 12.5px; cursor:pointer; }
  .col-label input{ font-family: var(--font-body); }
  .col-dim{ display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .col-dim input{ width: 46px; text-align:center; }
  .dim-x{ color: var(--rule-dark); font-family: var(--font-mono); font-size:12px; }
  .col-qty input{ width: 44px; text-align:center; font-weight:600; }
  .col-unit select{ width: 56px; }
  .col-img{ width: 40px; text-align:center; }
  .asset-thumb-btn{ width:32px; height:32px; border-radius:4px; border:1px dashed var(--rule-dark); background:var(--paper-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; padding:0; position:relative; overflow:hidden; }
  .asset-thumb-btn img{ width:100%; height:100%; object-fit:cover; }
  .asset-thumb-remove{ position:absolute; top:-5px; right:-5px; width:15px; height:15px; border-radius:50%; background:var(--rust); color:white; border:none; font-size:10px; line-height:1; cursor:pointer; padding:0; }
  .del-btn{ background:none; border:none; cursor:pointer; color: var(--rule-dark); font-size: 16px; line-height:1; padding: 4px 6px; border-radius: 3px; }
  .del-btn:hover{ color: var(--rust); background: rgba(184,69,46,0.08); }
  .add-row-btn{ margin-top: 12px; background: none; border: 1.5px dashed var(--rule-dark); color: var(--blue-dim); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.03em; padding: 9px 14px; border-radius: 4px; cursor:pointer; }
  .add-row-btn:hover{ border-color: var(--blue); color: var(--blue); }
  .summary-strip{ display:flex; gap: 22px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--rule); flex-wrap:wrap; }
  .summary-chip{ font-family: var(--font-mono); font-size: 11.5px; color: var(--blue); background: rgba(44,74,110,0.08); border-radius: 3px; padding: 6px 10px; }
  .summary-chip b{ color: var(--ink); }
  .locked-banner{ font-family: var(--font-mono); font-size: 11px; color: var(--green); background: rgba(75,107,79,0.08); border: 1px solid rgba(75,107,79,0.3); padding: 8px 12px; border-radius:4px; margin: 0 38px 0; }

  .ticket-footer{ display:flex; justify-content: flex-end; gap: 10px; padding: 18px 38px 30px; flex-wrap:wrap; }
  .action-btn{ font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; padding: 10px 18px; border-radius: 4px; cursor:pointer; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); }
  .action-btn:hover{ background: var(--ink); color: var(--paper); }
  .action-btn.primary{ background: var(--blue); border-color: var(--blue); color: var(--paper); }
  .action-btn.primary:hover{ background: var(--blue-dim); border-color: var(--blue-dim); }
  .action-btn.submit{ background: var(--green); border-color: var(--green); color: var(--paper); }
  .action-btn.submit:hover{ background: #3d5a41; }
  .action-btn.danger{ border-color: var(--rust); color: var(--rust); }
  .action-btn.danger:hover{ background: var(--rust); color: var(--paper); }
  .save-note{ font-family: var(--font-mono); font-size: 10.5px; color: var(--rule-dark); text-align:right; padding: 0 38px 8px; height: 14px; }

  @media print{
    body{ background: white; }
    .sidebar, .ticket-footer, .add-row-btn, .del-btn, .new-project-btn, .save-note, .mockup-actions, .mockup-remove, .asset-thumb-remove{ display:none !important; }
    .app{ display:block; }
    .main{ padding: 0; }
    .ticket{ box-shadow:none; max-width:100%; }
  }
  @media (max-width: 720px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; overflow-x:auto; padding: 16px; }
    .meta-row{ grid-template-columns: 1fr; }
    .main{ padding: 20px 14px 40px; }
    .ticket-header{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Job Tickets<span>print project tracker</span></div>
    <div id="tab-list"></div>
    <button class="new-project-btn" id="newProjectBtn">+ New project</button>
    <div class="empty-sidebar-note" id="emptyNote" style="display:none;">No projects yet. Start one above.</div>
    <div class="sidebar-footer">
      <button class="backup-btn" id="backupBtn">⬇ Download full backup</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="no-project" id="noProjectMsg">Select or create a project to get started.</div>
  </div>
</div>

<script>
const INDEX_KEY = 'print-projects-index-v2';
const PROJECT_KEY = id => 'print-project-v2:' + id;
const CATEGORIES = ['Sign','Poster','Large Wall / Backdrop','Die-Cut Piece','Menu','Sticker','Other'];
const UNITS = ['in','ft','cm','mm'];
const MAX_PDF_BYTES = 3.5 * 1024 * 1024;

let index = [];       // [{id,name,client,eventDate,status,assetCount}]
let cache = {};        // id -> full project object
let activeId = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function newProjectObj(){
  return { id: uid(), name: 'Untitled Project', client: '', eventDate: '', notes: '',
    status: 'draft', submittedAt: null, mockups: [], assets: [ newAsset() ] };
}
function newAsset(){
  return { id: uid(), category: 'Sign', label: '', w: '', h: '', unit: 'in', qty: 1, material: '', notes: '', image: null };
}
function indexEntryFrom(p){
  return { id: p.id, name: p.name, client: p.client, eventDate: p.eventDate, status: p.status, assetCount: p.assets.length };
}

async function init(){
  try{
    const res = await window.storage.get(INDEX_KEY, false);
    if(res && res.value) index = JSON.parse(res.value);
  }catch(e){ index = []; }
  if(index.length) activeId = index[0].id;
  await ensureLoaded(activeId);
  render();
}

async function ensureLoaded(id){
  if(!id || cache[id]) return;
  try{
    const res = await window.storage.get(PROJECT_KEY(id), false);
    if(res && res.value) cache[id] = JSON.parse(res.value);
  }catch(e){ console.log('Could not load project', id, e); }
}

async function selectProject(id){
  activeId = id;
  await ensureLoaded(id);
  render();
}

let saveTimers = {};
function saveIndex(){
  window.storage.set(INDEX_KEY, JSON.stringify(index), false).catch(e=>console.error('index save failed', e));
}
function saveProject(p, immediate){
  const idx = index.findIndex(e=>e.id===p.id);
  if(idx>=0) index[idx] = indexEntryFrom(p); else index.push(indexEntryFrom(p));
  saveIndex();
  clearTimeout(saveTimers[p.id]);
  const doSave = async ()=>{
    const note = document.getElementById('saveNote');
    try{
      await window.storage.set(PROJECT_KEY(p.id), JSON.stringify(p), false);
      if(note) note.textContent = 'Saved ' + new Date().toLocaleTimeString();
    }catch(e){
      if(note) note.textContent = 'Save failed — file may be too large';
      console.error('project save failed', e);
    }
  };
  if(immediate){ doSave(); } else { saveTimers[p.id] = setTimeout(doSave, 350); }
}

function getActive(){ return activeId ? cache[activeId] : null; }

/* ---------------- RENDER ---------------- */
function render(){ renderSidebar(); renderMain(); }

function renderSidebar(){
  const list = document.getElementById('tab-list');
  const emptyNote = document.getElementById('emptyNote');
  list.innerHTML = '';
  emptyNote.style.display = index.length ? 'none' : 'block';
  index.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'tab' + (p.id === activeId ? ' active' : '');
    btn.innerHTML = `${escapeHtml(p.name || 'Untitled Project')}
      <span class="tab-sub"><span class="mini-badge ${p.status}">${p.status}</span>${p.assetCount} item${p.assetCount===1?'':'s'}${p.eventDate ? ' · ' + escapeHtml(p.eventDate) : ''}</span>`;
    btn.onclick = ()=> selectProject(p.id);
    list.appendChild(btn);
  });
}

function renderMain(){
  const main = document.getElementById('main');
  const project = getActive();
  if(!project){ main.innerHTML = '<div class="no-project">Select or create a project to get started.</div>'; return; }

  const locked = project.status === 'submitted';
  const dis = locked ? 'disabled' : '';

  const assetsRows = project.assets.map(a => assetRowHtml(a, locked)).join('');
  const totalItems = project.assets.reduce((sum,a)=> sum + (parseInt(a.qty)||0), 0);
  const catCounts = {};
  project.assets.forEach(a=>{ catCounts[a.category] = (catCounts[a.category]||0) + (parseInt(a.qty)||0); });
  const chips = Object.entries(catCounts).filter(([,c])=>c>0).map(([cat,c])=>
    `<div class="summary-chip"><b>${c}</b> ${escapeHtml(cat)}${c===1?'':'s'}</div>`).join('');

  const mockupCards = project.mockups.map(m=>{
    if(m.type === 'image'){
      return `<div class="mockup-card"><img class="mockup-thumb" src="${m.dataUrl}">
        ${locked?'':`<button class="mockup-remove" data-remove-mockup="${m.id}">×</button>`}
        <div class="mockup-name">${escapeHtml(m.name)}</div></div>`;
    } else if(m.type === 'pdf'){
      return `<div class="mockup-card"><a class="mockup-file-card" href="${m.dataUrl}" target="_blank" rel="noopener">📄</a>
        ${locked?'':`<button class="mockup-remove" data-remove-mockup="${m.id}">×</button>`}
        <div class="mockup-name">${escapeHtml(m.name)}</div></div>`;
    } else {
      return `<div class="mockup-card"><a class="mockup-link-card" href="${escapeAttr(m.url)}" target="_blank" rel="noopener">🔗</a>
        ${locked?'':`<button class="mockup-remove" data-remove-mockup="${m.id}">×</button>`}
        <div class="mockup-name">${escapeHtml(m.name || m.url)}</div></div>`;
    }
  }).join('');

  main.innerHTML = `
    <div class="ticket ${locked?'locked':''}">
      <div class="ticket-header">
        <div class="ticket-header-left">
          <div class="eyebrow">Project / Event <span class="status-badge ${project.status}">${project.status}${project.submittedAt ? ' · ' + new Date(project.submittedAt).toLocaleDateString() : ''}</span></div>
          <input class="project-name-input" id="nameInput" value="${escapeAttr(project.name)}" placeholder="Project name" ${dis}>
        </div>
        <div class="stamp ${locked?'is-submitted':''}">${locked?'WORK ORDER':'JOB TICKET'}<b>#${project.id.slice(-5).toUpperCase()}</b></div>
      </div>

      <div class="meta-row">
        <div class="field"><label>Client</label><input id="clientInput" value="${escapeAttr(project.client)}" placeholder="Client / company name" ${dis}></div>
        <div class="field"><label>Event date</label><input id="dateInput" value="${escapeAttr(project.eventDate)}" placeholder="e.g. 2026-09-12" ${dis}></div>
        <div class="field"><label>Total line items</label><input value="${project.assets.length} asset type${project.assets.length===1?'':'s'} · ${totalItems} piece${totalItems===1?'':'s'} total" disabled style="color:var(--blue); font-family:var(--font-mono);"></div>
        <div class="field notes"><label>Project notes</label><textarea id="notesInput" placeholder="Venue details, install date, special handling..." ${dis}>${escapeHtml(project.notes)}</textarea></div>
      </div>

      <div class="mockups-section">
        <div class="section-title">Mockups &amp; Reference Files</div>
        <div class="mockup-grid">${mockupCards || ''}</div>
        ${locked ? '' : `
        <div class="mockup-actions">
          <button class="upload-btn" id="uploadImgBtn">＋ Upload image</button>
          <button class="upload-btn" id="uploadPdfBtn">＋ Upload PDF</button>
          <div class="link-add">
            <input id="linkInput" placeholder="Paste Drive/Dropbox link...">
            <button id="linkAddBtn">Add link</button>
          </div>
        </div>
        <div class="file-hint">Images are auto-compressed for storage. Large PDFs (over ~3.5MB) won't fit inline — paste a Drive link instead.</div>
        `}
      </div>

      <div class="ledger">
        <div class="section-title">Asset Breakdown</div>
        <table>
          <thead><tr>
            <th style="width:9%"></th>
            <th style="width:14%">Category</th>
            <th style="width:19%">Label / description</th>
            <th style="width:15%">Size (W × H)</th>
            <th style="width:6%">Qty</th>
            <th style="width:13%">Material / stock</th>
            <th style="width:18%">Notes / finishing</th>
            <th style="width:4%"></th>
          </tr></thead>
          <tbody id="assetTbody">${assetsRows}</tbody>
        </table>
        ${locked ? '' : '<button class="add-row-btn" id="addRowBtn">+ Add asset</button>'}
        <div class="summary-strip">${chips || '<div class="summary-chip">No items yet</div>'}</div>
      </div>

      ${locked ? '<div class="locked-banner">This work order is submitted and locked for edits. Click "Reopen for edits" below to make changes.</div>' : ''}

      <div class="save-note" id="saveNote"></div>
      <div class="ticket-footer">
        <button class="action-btn danger" id="deleteProjectBtn">Delete project</button>
        <button class="action-btn" id="printBtn">Print / Save PDF</button>
        <button class="action-btn" id="exportBtn">Export CSV</button>
        <button class="action-btn primary" id="saveDraftBtn">Save draft</button>
        ${locked
          ? '<button class="action-btn submit" id="reopenBtn">Reopen for edits</button>'
          : '<button class="action-btn submit" id="submitBtn">Submit work order</button>'}
      </div>
    </div>
  `;

  wireUp(project, locked);
}

function wireUp(project, locked){
  const q = sel => document.getElementById(sel);
  if(!locked){
    q('nameInput').oninput = e => { project.name = e.target.value; saveProject(project); renderSidebar(); };
    q('clientInput').oninput = e => { project.client = e.target.value; saveProject(project); };
    q('dateInput').oninput = e => { project.eventDate = e.target.value; saveProject(project); renderSidebar(); };
    q('notesInput').oninput = e => { project.notes = e.target.value; saveProject(project); };
    q('addRowBtn').onclick = ()=>{ project.assets.push(newAsset()); saveProject(project); renderMain(); };
    q('uploadImgBtn').onclick = ()=> pickMockupFile('image');
    q('uploadPdfBtn').onclick = ()=> pickMockupFile('pdf');
    q('linkAddBtn').onclick = ()=>{
      const val = q('linkInput').value.trim();
      if(!val) return;
      project.mockups.push({ id: uid(), type:'link', url: val, name: val.split('/').pop().slice(0,40) });
      saveProject(project); renderMain();
    };
    document.querySelectorAll('[data-remove-mockup]').forEach(btn=>{
      btn.onclick = ()=>{
        project.mockups = project.mockups.filter(m=>m.id !== btn.dataset.removeMockup);
        saveProject(project); renderMain();
      };
    });
  }

  q('printBtn').onclick = ()=> window.print();
  q('exportBtn').onclick = ()=> exportCSV(project);
  q('saveDraftBtn').onclick = ()=> saveProject(project, true);
  q('deleteProjectBtn').onclick = ()=>{
    if(confirm(`Delete "${project.name}"? This can't be undone.`)){
      index = index.filter(p=>p.id !== project.id);
      delete cache[project.id];
      saveIndex();
      window.storage.delete(PROJECT_KEY(project.id), false).catch(()=>{});
      activeId = index.length ? index[0].id : null;
      ensureLoaded(activeId).then(render);
    }
  };
  const submitBtn = q('submitBtn');
  if(submitBtn) submitBtn.onclick = ()=>{
    project.status = 'submitted';
    project.submittedAt = Date.now();
    saveProject(project, true); renderMain(); renderSidebar();
  };
  const reopenBtn = q('reopenBtn');
  if(reopenBtn) reopenBtn.onclick = ()=>{
    project.status = 'draft';
    saveProject(project, true); renderMain(); renderSidebar();
  };

  if(!locked){
    project.assets.forEach(a=>{
      const row = document.getElementById('row-' + a.id);
      if(!row) return;
      row.querySelector('.f-category').onchange = e => { a.category = e.target.value; saveProject(project); renderMain(); };
      row.querySelector('.f-label').oninput = e => { a.label = e.target.value; saveProject(project); };
      row.querySelector('.f-w').oninput = e => { a.w = e.target.value; saveProject(project); };
      row.querySelector('.f-h').oninput = e => { a.h = e.target.value; saveProject(project); };
      row.querySelector('.f-unit').onchange = e => { a.unit = e.target.value; saveProject(project); };
      row.querySelector('.f-qty').oninput = e => { a.qty = e.target.value; saveProject(project); renderMain(); };
      row.querySelector('.f-material').oninput = e => { a.material = e.target.value; saveProject(project); };
      row.querySelector('.f-notes').oninput = e => { a.notes = e.target.value; saveProject(project); };
      row.querySelector('.del-btn').onclick = ()=>{ project.assets = project.assets.filter(x=>x.id !== a.id); saveProject(project); renderMain(); };
      const thumbBtn = row.querySelector('.asset-thumb-btn');
      if(thumbBtn) thumbBtn.onclick = ()=> pickAssetImage(project, a.id);
      const thumbRemove = row.querySelector('.asset-thumb-remove');
      if(thumbRemove) thumbRemove.onclick = (ev)=>{ ev.stopPropagation(); a.image = null; saveProject(project); renderMain(); };
    });
  }
}

function assetRowHtml(a, locked){
  const catOptions = CATEGORIES.map(c => `<option value="${c}" ${c===a.category?'selected':''}>${c}</option>`).join('');
  const unitOptions = UNITS.map(u => `<option value="${u}" ${u===a.unit?'selected':''}>${u}</option>`).join('');
  const dis = locked ? 'disabled' : '';
  const thumb = a.image
    ? `<button class="asset-thumb-btn" ${dis}><img src="${a.image}">${locked?'':'<button class=\"asset-thumb-remove\">×</button>'}</button>`
    : `<button class="asset-thumb-btn" ${dis}>📷</button>`;
  return `
    <tr id="row-${a.id}">
      <td class="col-img">${thumb}</td>
      <td><select class="f-category" ${dis}>${catOptions}</select></td>
      <td class="col-label"><input class="f-label" value="${escapeAttr(a.label)}" placeholder="e.g. Entrance backdrop" ${dis}></td>
      <td><div class="col-dim">
          <input class="f-w" value="${escapeAttr(a.w)}" placeholder="W" inputmode="decimal" ${dis}>
          <span class="dim-x">×</span>
          <input class="f-h" value="${escapeAttr(a.h)}" placeholder="H" inputmode="decimal" ${dis}>
          <select class="f-unit col-unit" ${dis}>${unitOptions}</select>
        </div></td>
      <td class="col-qty"><input class="f-qty" value="${escapeAttr(a.qty)}" inputmode="numeric" ${dis}></td>
      <td><input class="f-material" value="${escapeAttr(a.material)}" placeholder="e.g. Foamcore" ${dis}></td>
      <td><input class="f-notes" value="${escapeAttr(a.notes)}" placeholder="Bleed, mounting, etc." ${dis}></td>
      <td>${locked ? '' : '<button class="del-btn" title="Remove row">×</button>'}</td>
    </tr>
  `;
}

/* ---------------- FILE HANDLING ---------------- */
function fileToCompressedImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height && width > maxDim){ height = height * (maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function fileToDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function pickMockupFile(kind){
  const project = getActive();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = kind === 'image' ? 'image/*' : 'application/pdf';
  input.multiple = true;
  input.onchange = async ()=>{
    for(const file of Array.from(input.files)){
      try{
        if(kind === 'image'){
          const dataUrl = await fileToCompressedImage(file, 1400, 0.75);
          project.mockups.push({ id: uid(), type:'image', name: file.name, dataUrl });
        } else {
          if(file.size > MAX_PDF_BYTES){
            alert(`"${file.name}" is too large to store here (${(file.size/1024/1024).toFixed(1)}MB). Paste a Drive/Dropbox link instead.`);
            continue;
          }
          const dataUrl = await fileToDataURL(file);
          project.mockups.push({ id: uid(), type:'pdf', name: file.name, dataUrl });
        }
      }catch(e){ console.error('file read failed', e); }
    }
    saveProject(project, true);
    renderMain();
  };
  input.click();
}

function pickAssetImage(project, assetId){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async ()=>{
    const file = input.files[0];
    if(!file) return;
    try{
      const dataUrl = await fileToCompressedImage(file, 500, 0.65);
      const asset = project.assets.find(a=>a.id === assetId);
      asset.image = dataUrl;
      saveProject(project, true);
      renderMain();
    }catch(e){ console.error('asset image failed', e); }
  };
  input.click();
}

/* ---------------- EXPORT ---------------- */
function exportCSV(project){
  const headers = ['Category','Label','Width','Height','Unit','Qty','Material','Notes','Has Image'];
  const lines = [headers.join(',')];
  project.assets.forEach(a=>{
    lines.push([a.category, a.label, a.w, a.h, a.unit, a.qty, a.material, a.notes, a.image ? 'Yes' : 'No'].map(csvEscape).join(','));
  });
  downloadBlob(lines.join('\n'), 'text/csv;charset=utf-8;', `${slug(project.name)}_asset_breakdown.csv`);
}

async function downloadFullBackup(){
  const all = [];
  for(const entry of index){
    await ensureLoaded(entry.id);
    if(cache[entry.id]) all.push(cache[entry.id]);
  }
  downloadBlob(JSON.stringify({ exportedAt: new Date().toISOString(), projects: all }, null, 2),
    'application/json;charset=utf-8;', `print_projects_backup_${new Date().toISOString().slice(0,10)}.json`);
}

function downloadBlob(content, mime, filename){
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function csvEscape(val){ const str = String(val ?? ''); return /[",\n]/.test(str) ? '"' + str.replace(/"/g,'""') + '"' : str; }
function slug(s){ return (s||'project').replace(/[^a-z0-9]+/gi,'_').toLowerCase(); }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }
function escapeAttr(str){ return String(str ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

document.getElementById('newProjectBtn').onclick = ()=>{
  const p = newProjectObj();
  cache[p.id] = p;
  activeId = p.id;
  saveProject(p, true);
  render();
};
document.getElementById('backupBtn').onclick = downloadFullBackup;

init();
</script>
